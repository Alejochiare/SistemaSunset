<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InmoCRM · Gestión Inmobiliaria</title>
  <meta name="description" content="CRM inmobiliario: clientes, propiedades, alquileres y ventas." />

  <!-- Tipografías -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Chart.js para gráficos -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <!-- html2pdf.js: genera el PDF real de los informes para poder compartirlo (ej. por WhatsApp) -->
  <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>

  <!-- Estilos modulares -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/views.css" />
</head>
<body>
  <div class="app" id="app">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="brand">
        <img src="logooo.png" class="brand-logo-img" alt="Logo">
      </div>
      <nav class="nav" id="nav"><!-- generado por sidebar.js --></nav>
      <div class="sidebar-foot">
        <div class="brand-sub" style="padding:.9rem 1.1rem;opacity:.5">InmoCRM v2</div>
      </div>
    </aside>

    <!-- MAIN -->
    <div class="main">
      <header class="topbar">
        <button class="icon-btn menu-toggle" id="menuToggle" aria-label="Menú">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <button class="icon-btn desktop-only" id="collapseToggle" aria-label="Colapsar menú">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 3v18M3 5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        </button>


        <div class="ml-auto flex items-center gap-2">
          <div class="dropdown">
            <button class="icon-btn" id="notifBtn" aria-label="Notificaciones">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
              <span class="dot" id="notifDot"></span>
            </button>
            <div id="notifPanel"></div>
          </div>
          <button class="icon-btn" id="themeToggle" aria-label="Cambiar tema">
            <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          </button>
        </div>
      </header>

      <div class="view-scroll">
        <main id="viewRoot"><!-- vistas inyectadas por el router --></main>
      </div>
    </div>
  </div>

  <div class="scrim" id="scrim"></div>
  <div id="modalRoot"></div>
  <div class="toast-wrap" id="toastRoot"></div>

  <!-- Punto de entrada ES6 -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
